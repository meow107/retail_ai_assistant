<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail AI Assistant</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .header {
      padding: 15px;
      background: #111;
      color: white;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      gap: 5px;
    }

    textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      max-height: 120px;
    }

    button {
      padding: 12px 16px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #333; }

    .dots span {
      animation: blink 1s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .chat-container {
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="header">🛍️ Retail AI Assistant</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Nhập câu hỏi..." rows="1"></textarea>
    <button onclick="sendMessage()">Gửi</button>
  </div>

</div>

<script>
/* 🌍 ENV SWITCH */
const API_BASE_URL =
  window.location.hostname === "localhost"
    ? "http://127.0.0.1:8000"
    : "https://retail-ai-assistant-3f2i.onrender.com";

console.log("Using API:", API_BASE_URL);

/* 🧱 ADD MESSAGE SAFELY */
function addMessage(text, type) {
  const messages = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerText = text;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* ⏳ TYPING */
function addTyping() {
  const messages = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typing";

  div.innerHTML = `
    <div class="dots">
      AI đang trả lời
      <span>.</span><span>.</span><span>.</span>
    </div>
  `;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

/* 🚀 SEND */
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addTyping();

  try {
    const res = await fetch(`${API_BASE_URL}/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: text })
    });

    const data = await res.json();

    removeTyping();

    addMessage(data.answer || "⚠️ Không có phản hồi", "bot");

  } catch (err) {
    console.error(err);
    removeTyping();
    addMessage("❌ Server error", "bot");
  }
}

/* ⌨️ ENTER / SHIFT+ENTER */
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
