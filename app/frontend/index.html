<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail AI Assistant</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 10px;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .header {
      padding: 15px;
      background: #111;
      color: white;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      background: #eee;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px 16px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #333;
    }

    /* typing animation */
    .dots span {
      animation: blink 1s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 📱 mobile */
    @media (max-width: 600px) {
      .chat-container {
        height: 100vh;
        border-radius: 0;
      }

      body {
        padding: 0;
      }

      .msg {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    🛍️ Retail AI Assistant
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Nhập câu hỏi..." />
    <button onclick="sendMessage()">Gửi</button>
  </div>

</div>

<script>
function addTypingIndicator() {
  const messages = document.getElementById("messages");

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.id = "typing";

  typing.innerHTML = `
    <div class="dots">
      AI đang trả lời
      <span>.</span><span>.</span><span>.</span>
    </div>
  `;

  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;
}

function removeTypingIndicator() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

async function sendMessage() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const text = input.value.trim();
  if (!text) return;

  // user message
  messages.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = "";
  messages.scrollTop = messages.scrollHeight;

  // typing
  addTypingIndicator();

  try {
    const res = await fetch("http://127.0.0.1:8000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: text })
    });

    const data = await res.json();

    removeTypingIndicator();

    messages.innerHTML += `<div class="msg bot">${data.answer}</div>`;
    messages.scrollTop = messages.scrollHeight;

  } catch (err) {
    removeTypingIndicator();
    messages.innerHTML += `<div class="msg bot">❌ Server error</div>`;
  }
}
</script>

</body>
</html>
